# custom menu definition for klipperscreen
# append this config to your /home/pi/printer_data/config/KlipperScreen.conf or printer.cfg folder equivalent
# this adds a dedicated menu for word games under the main screen

[menu __main word_games]
name: Word Games
icon: robot

[menu __main word_games play_wordhunt]
name: Word Hunt
icon: play
method: printer.gcode.script
params: {"script": "PLAY_WORDHUNT"}

[menu __main word_games play_anagrams]
name: Anagrams
icon: play
method: printer.gcode.script
params: {"script": "PLAY_ANAGRAMS"}

[menu __main word_games calibrate]
name: Calibrate Bot
icon: settings
method: printer.gcode.script
params: {"script": "CALIBRATE_GAME_BOT"}

[menu __main word_games stop]
name: Stop Bot
icon: cancel
method: printer.gcode.script
params: {"script": "STOP_GAME_BOT"}
