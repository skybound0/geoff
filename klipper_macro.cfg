# configuration for klipper gcode shell command extension
# copy this configuration to your printer.cfg or include it via [include klipper_macro.cfg]
# note: you must have the gcode_shell_command extension installed (available via kiauh)

# timeouts are generous since main.py now blocks on M400 per move; raise
# further if you bump max_wordhunt_words/max_anagram_words in config.json
[gcode_shell_command play_wordhunt]
command: python3 /home/skybound/word_game_bot/main.py --game wordhunt
timeout: 240.0
verbose: True

[gcode_shell_command play_anagrams]
command: python3 /home/skybound/word_game_bot/main.py --game anagrams
timeout: 240.0
verbose: True

[gcode_shell_command calibrate_vision]
command: python3 /home/skybound/word_game_bot/calibrate.py
timeout: 30.0
verbose: True

# kills the running bot (via its lock file pid); panic-retract handles the lift
[gcode_shell_command cancel_game]
command: bash -c "kill $(cat /home/skybound/word_game_bot/.gamebot.lock) 2>/dev/null; rm -f /home/skybound/word_game_bot/.gamebot.lock; echo cancelled"
timeout: 10.0
verbose: True

[gcode_macro PLAY_WORDHUNT]
description: run the python word hunt solver and move the stylus to swipe words
gcode:
    RUN_SHELL_COMMAND CMD=play_wordhunt

[gcode_macro PLAY_ANAGRAMS]
description: run the python anagrams solver and move the stylus to tap letters
gcode:
    RUN_SHELL_COMMAND CMD=play_anagrams

[gcode_macro CALIBRATE_GAME_BOT]
description: run the camera calibration script to test marker detection and coordinate mapping
gcode:
    RUN_SHELL_COMMAND CMD=calibrate_vision

[gcode_macro STOP_GAME_BOT]
description: stop a running word game bot script and lift the stylus clear of the phone
gcode:
    RUN_SHELL_COMMAND CMD=cancel_game
    # panic-retract; adjust Z distance to clear your z_up/z_down gap
    G91
    G1 Z10 F1500
    G90
